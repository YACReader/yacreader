name: Extract Release Notes
description: Extract release notes from CHANGELOG.md for a given version

inputs:
  version:
    description: Version to extract notes for
    required: true

outputs:
  notes:
    description: Extracted release notes
    value: ${{ steps.extract.outputs.notes }}

runs:
  using: composite
  steps:
    - id: extract
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        CHANGELOG_VERSION=$(printf "%s\n" "$VERSION" | sed -nE 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/p')
        if [ -z "$CHANGELOG_VERSION" ]; then
          echo "Unable to derive x.y.z changelog version from '$VERSION'" >&2
          exit 1
        fi
        CHANGELOG_VERSION_PATTERN=$(printf "%s\n" "$CHANGELOG_VERSION" | sed 's/[.[\*^$()+?{}|\\]/\\&/g')
        NOTES=$(awk "/^## ${CHANGELOG_VERSION_PATTERN}( |$)/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)
        {
          echo "notes<<EOF"
          echo "$NOTES"
          echo "EOF"
        } >> $GITHUB_OUTPUT
