          sudo apt-get install -y osslsigncode

          echo ""
          echo "=== Checking signatures on Windows installers ==="
          for installer in staging/YACReader*.exe; do
            if [ -f "$installer" ]; then
              echo "Checking: $(basename $installer)"
              echo "File size: $(stat -c%s $installer) bytes"

