                osslsigncode verify -in "$installer" 2>&1 | grep -E "(Signed|Signer|Timestamp)"
              else
                echo "  ✗ UNSIGNED or INVALID - No valid signature found (expected for yacreader10 pre-releases)"
                osslsigncode verify -in "$installer" 2>&1 | head -20
              fi
              echo ""
            fi
          done

          echo "=== Summary ==="
